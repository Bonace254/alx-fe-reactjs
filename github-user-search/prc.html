<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Tailwind Card — Quick Test</title>
</head>
<body class="p-8 bg-gray-50">
  <div class="max-w-sm bg-gray-100 rounded-lg shadow-md p-6">
    <h2 class="text-xl font-semibold text-gray-800 mb-2">Card Title</h2>
    <p class="text-gray-600 mb-4">This is a short description inside the card. You can add more details here.</p>
    <button type="button" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition">
      Learn More
    </button>
  </div>
  <div class="p-6">
  <h1 class="text-base md:text-xl font-bold text-gray-800">
    This heading adjusts size with screen width
  </h1>
  <p class="text-base md:text-xl text-gray-600">
    On small screens, I’m 16px. On medium and larger, I grow to 20px.
  </p>
</div>
</body>
</html>
